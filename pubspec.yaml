name: campus_task
description: A fintech task-earning app for students, built with Flutter and Supabase.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  google_fonts: ^6.2.1
  share_plus: ^10.0.0
  app_links: ^6.0.0
  url_launcher: ^6.3.0
  device_info_plus: ^10.1.0
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
